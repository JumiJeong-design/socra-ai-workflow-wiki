<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>실무 가이드 & 플레이북 — Socra AI Workflow</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <link rel="stylesheet" href="ai-workflow-guide.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script>(function(){var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>

<!-- Mobile top bar -->
<header class="mobile-topbar">
  <button class="hamburger" id="hamburger" aria-label="메뉴 열기">
    <span></span><span></span><span></span>
  </button>
  <span class="mobile-topbar-title">실무 가이드 & 플레이북</span>
</header>

<!-- Sidebar overlay -->
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="layout">

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar"></nav>

  <!-- Main -->
  <main class="main" id="wiki-main">
    <div class="wiki-loading">문서를 불러오는 중...</div>
  </main>

</div>

<script>
const GROUPS = [
  {
    label: '실무 가이드',
    docs: [
      { id: 'figma-git-sync',                path: '../wiki/guides/figma-git-sync.md' },
      { id: 'figma-first-storybook-verified', path: '../wiki/guides/figma-first-storybook-verified.md' },
      { id: 'ai-design-review',              path: '../wiki/guides/ai-design-review.md' },
      { id: 'daily-worklog-to-wiki',         path: '../wiki/guides/daily-worklog-to-wiki.md' },
      { id: 'designer-dev-terms',            path: '../wiki/guides/designer-dev-terms.md' },
    ]
  },
  {
    label: '플레이북 / 기록',
    docs: [
      { id: 'component-update-playbook', path: '../wiki/playbooks/component-update-playbook.md' },
      { id: 'screen-design-playbook',    path: '../wiki/playbooks/screen-design-playbook.md' },
      { id: 'agent-handoff-playbook',    path: '../wiki/playbooks/agent-handoff-playbook.md' },
    ]
  }
];

const DOCS = GROUPS.flatMap(g => g.docs);

marked.use({ gfm: true, breaks: false });

const mainEl = document.getElementById('wiki-main');

Promise.all(DOCS.map(doc =>
  fetch(doc.path).then(r => r.ok ? r.text() : Promise.reject(doc.id))
)).then(texts => {
  let docIndex = 0;
  mainEl.innerHTML = GROUPS.map(group => {
    const sections = group.docs.map(doc => {
      const html = marked.parse(texts[docIndex++]);
      return `<section class="wiki-doc" id="${doc.id}">${html}</section>`;
    }).join('\n');
    return `<div class="wiki-group">
  <div class="wiki-group-label">${group.label}</div>
  ${sections}
</div>`;
  }).join('\n');

  // scroll to anchor if present
  const hash = location.hash.slice(1);
  if (hash) {
    const el = document.getElementById(hash);
    if (el) setTimeout(() => el.scrollIntoView({ behavior: 'smooth' }), 100);
  }
}).catch(id => {
  mainEl.innerHTML = `<div class="wiki-doc"><p style="color:var(--text-muted)">일부 문서를 불러오지 못했습니다 (${id}).</p></div>`;
});
</script>

<script src="ai-workflow-guide.js?v=0.14-wiki"></script>
</body>
</html>
