<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Wiki — Socra AI Workflow</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <link rel="stylesheet" href="ai-workflow-guide.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script>(function(){var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>

<!-- Mobile top bar -->
<header class="mobile-topbar">
  <button class="hamburger" id="hamburger" aria-label="메뉴 열기">
    <span></span><span></span><span></span>
  </button>
  <span class="mobile-topbar-title" id="mobile-doc-title">Wiki</span>
</header>

<!-- Sidebar overlay -->
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="layout">

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar"></nav>

  <!-- Main -->
  <main class="main">
    <div id="wiki-content" class="wiki-doc">
      <div class="wiki-loading">문서를 불러오는 중...</div>
    </div>
  </main>

</div>

<script>
// ─── Doc registry ─────────────────────────────────────────
const DOCS = {
  'figma-git-sync':               '../wiki/guides/figma-git-sync.md',
  'figma-first-storybook-verified': '../wiki/guides/figma-first-storybook-verified.md',
  'ai-design-review':             '../wiki/guides/ai-design-review.md',
  'daily-worklog-to-wiki':        '../wiki/guides/daily-worklog-to-wiki.md',
  'designer-dev-terms':           '../wiki/guides/designer-dev-terms.md',
  'component-update-playbook':    '../wiki/playbooks/component-update-playbook.md',
  'screen-design-playbook':       '../wiki/playbooks/screen-design-playbook.md',
};

// ─── Render ───────────────────────────────────────────────
const contentEl = document.getElementById('wiki-content');

function renderDoc(docId) {
  const path = DOCS[docId];
  if (!path) {
    contentEl.innerHTML = '<div class="wiki-error"><strong>문서를 찾을 수 없습니다.</strong><br>올바른 <code>?doc=</code> 파라미터를 확인해주세요.</div>';
    return;
  }

  fetch(path)
    .then(res => {
      if (!res.ok) throw new Error('fetch failed');
      return res.text();
    })
    .then(md => {
      marked.use({ gfm: true, breaks: false });
      contentEl.innerHTML = marked.parse(md);
      const h1 = contentEl.querySelector('h1');
      if (h1) {
        document.title = h1.textContent + ' — Socra AI Workflow';
        document.getElementById('mobile-doc-title').textContent = h1.textContent;
      }
    })
    .catch(() => {
      contentEl.innerHTML = '<div class="wiki-error">문서를 불러오지 못했습니다. 경로를 확인해주세요.</div>';
    });
}

const docId = new URLSearchParams(location.search).get('doc');
renderDoc(docId || '');
</script>

<script src="ai-workflow-guide.js?v=0.14-wiki"></script>
</body>
</html>
