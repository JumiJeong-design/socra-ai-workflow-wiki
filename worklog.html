<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<style>
:root {
  --bg: #111111;
  --surface: #181818;
  --surface-2: #212121;
  --border: #2b2b2b;
  --text: #e2e2e2;
  --text-muted: #7a7a7a;
  --text-dim: #444;
  --accent: #818cf8;
  --accent-soft: rgba(129,140,248,.1);
  --code-bg: #1c1c1c;
  --sidebar-w: 264px;
  --topbar-h: 48px;
}
[data-theme="light"] {
  --bg: #fafaf9;
  --surface: #ffffff;
  --surface-2: #f3f3f1;
  --border: #e4e4e2;
  --text: #1c1c1c;
  --text-muted: #717171;
  --text-dim: #b5b5b5;
  --accent: #4f46e5;
  --accent-soft: rgba(79,70,229,.08);
  --code-bg: #f0f0ee;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;-webkit-font-smoothing:antialiased}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--text);display:flex;height:100%;font-size:15px;line-height:1.7
}

/* ── Sidebar ── */
.sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);height:100vh;
  position:sticky;top:0;background:var(--surface);
  border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;
  transition:transform .25s ease;
}
.sidebar-brand{padding:16px 16px 12px;border-bottom:1px solid var(--border)}
.brand-name{font-size:13px;font-weight:700;letter-spacing:-.01em;color:var(--text)}
.brand-meta{font-size:11px;color:var(--text-muted);margin-top:2px}

/* ── View toggle ── */
.view-toggle{display:flex;padding:8px 10px;gap:4px;border-bottom:1px solid var(--border)}
.vt-btn{
  flex:1;background:none;border:1px solid var(--border);border-radius:5px;
  padding:5px 0;font-size:11px;color:var(--text-muted);cursor:pointer;
  font-family:inherit;transition:all .12s;letter-spacing:.02em
}
.vt-btn:hover{color:var(--text)}
.vt-btn.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);font-weight:600}

/* ── Calendar ── */
.cal-nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px 8px;
}
.cal-nav-btn{
  background:none;border:none;color:var(--text-muted);cursor:pointer;
  font-size:18px;padding:2px 8px;border-radius:4px;line-height:1;
  transition:color .12s
}
.cal-nav-btn:hover{color:var(--text)}
.cal-month{font-size:13px;font-weight:600;color:var(--text)}
.cal-grid{
  display:grid;grid-template-columns:repeat(7,1fr);
  gap:2px;padding:0 10px 12px;
}
.cal-dow{
  font-size:10px;color:var(--text-dim);text-align:center;
  padding:4px 0 6px;font-weight:600;letter-spacing:.03em
}
.cal-dow:first-child{color:#e87070}
.cal-dow:last-child{color:#7098e8}
.cal-cell{
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  font-size:12px;color:var(--text-dim);border-radius:6px;position:relative
}
.cal-cell.sun{color:#c87070}
.cal-cell.sat{color:#6080c8}
.cal-cell.has-entry{
  color:var(--text);cursor:pointer;font-weight:600;
  background:var(--surface-2);
}
.cal-cell.has-entry:hover{background:var(--accent-soft);color:var(--accent)}
.cal-cell.active{background:var(--accent) !important;color:#fff !important;font-weight:700}
.cal-cell.today::after{
  content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);
  width:3px;height:3px;border-radius:50%;background:var(--accent)
}
.cal-cell.active.today::after{background:#fff}

/* ── Entry list ── */
.sidebar-list{flex:1;overflow-y:auto;padding:6px 0}
.sidebar-list.with-border{border-top:1px solid var(--border)}
.list-item{
  display:flex;flex-direction:column;padding:9px 16px;cursor:pointer;
  border-left:2px solid transparent;transition:all .12s
}
.list-item:hover{background:var(--surface-2)}
.list-item.active{border-left-color:var(--accent);background:var(--accent-soft)}
.list-date{font-size:13px;font-weight:500;color:var(--text)}
.list-item.active .list-date{color:var(--accent)}
.list-day{font-size:11px;color:var(--text-muted);margin-top:1px}
.list-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.list-tag{font-size:10px;color:var(--text-dim);background:var(--surface-2);
  padding:1px 6px;border-radius:20px;border:1px solid var(--border)}
/* compact variant (shown under calendar) */
.list-item.compact{flex-direction:row;align-items:center;gap:10px;padding:7px 14px}
.list-item.compact .list-dot{width:6px;height:6px;border-radius:50%;background:var(--border);flex-shrink:0}
.list-item.compact.active .list-dot{background:var(--accent)}
.list-item.compact .list-date{font-size:12px;font-weight:400;color:var(--text-muted)}
.list-item.compact.active .list-date{color:var(--accent);font-weight:500}

/* ── Overlay (mobile) ── */
.overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);
  z-index:199;opacity:0;transition:opacity .25s
}
.overlay.show{display:block;opacity:1}

/* ── Topbar ── */
.topbar{
  position:fixed;top:0;left:var(--sidebar-w);right:0;height:var(--topbar-h);
  background:var(--bg);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:flex-end;
  padding:0 16px;gap:8px;z-index:100
}
.icon-btn{
  background:none;border:1px solid var(--border);border-radius:6px;
  padding:5px 12px;font-size:12px;color:var(--text-muted);cursor:pointer;
  font-family:inherit;transition:all .12s
}
.icon-btn:hover{color:var(--text);border-color:var(--text-muted)}
.kbd-hint{font-size:11px;color:var(--text-dim);margin-right:auto}
.menu-btn{
  display:none;background:none;border:1px solid var(--border);border-radius:6px;
  padding:5px 10px;font-size:16px;color:var(--text-muted);cursor:pointer;
  line-height:1;margin-right:auto
}

/* ── Main ── */
.main{flex:1;overflow-y:auto;padding-top:var(--topbar-h)}

/* ── Entry ── */
.entry{max-width:720px;margin:0 auto;padding:40px 32px 80px}
.entry-header{margin-bottom:28px}
.entry-title{font-size:22px;font-weight:700;letter-spacing:-.03em;margin-bottom:10px}
.entry-tags{display:flex;flex-wrap:wrap;gap:6px}
.entry-tag{
  font-size:11px;background:var(--surface-2);color:var(--text-muted);
  padding:3px 9px;border-radius:20px;border:1px solid var(--border)
}

/* ── Markdown ── */
.md h1{display:none}
.md h2{
  font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;
  color:var(--text-muted);margin:36px 0 14px;padding-bottom:8px;
  border-bottom:1px solid var(--border)
}
.md h2:first-of-type{margin-top:0}
.md h3{font-size:14px;font-weight:600;color:var(--text);margin:22px 0 8px}
.md h4{font-size:13px;font-weight:600;color:var(--text-muted);margin:16px 0 6px}
.md p{font-size:14px;color:var(--text);margin-bottom:10px;line-height:1.75}
.md ul,.md ol{padding-left:20px;margin-bottom:12px}
.md li{font-size:14px;color:var(--text);margin-bottom:5px;line-height:1.65}
.md li p{margin-bottom:2px}
.md li input[type="checkbox"]{margin-right:6px;accent-color:var(--accent)}
.md blockquote{
  margin:12px 0;padding:10px 16px;
  background:var(--surface-2);border-left:3px solid var(--accent);
  border-radius:0 6px 6px 0;font-size:13px;color:var(--text-muted);font-style:italic
}
.md code{
  font-family:'SF Mono','Fira Code','Fira Mono',monospace;font-size:12.5px;
  background:var(--code-bg);border:1px solid var(--border);
  padding:2px 5px;border-radius:4px;color:var(--text)
}
.md pre{
  background:var(--code-bg);border:1px solid var(--border);border-radius:8px;
  padding:16px;overflow-x:auto;margin:12px 0
}
.md pre code{background:none;border:none;padding:0;font-size:13px;line-height:1.6}
.md table{
  width:100%;border-collapse:collapse;font-size:13px;margin:14px 0;
  border:1px solid var(--border);border-radius:8px;overflow:hidden
}
.md th{
  background:var(--surface-2);padding:8px 12px;text-align:left;
  font-weight:600;font-size:12px;color:var(--text-muted);
  border-bottom:1px solid var(--border)
}
.md td{padding:8px 12px;border-bottom:1px solid var(--border);font-size:13px}
.md tr:last-child td{border-bottom:none}
.md hr{border:none;border-top:1px solid var(--border);margin:28px 0}
.md strong{font-weight:600}
.md a{color:var(--accent);text-decoration:none}
.md a:hover{text-decoration:underline}

/* ── Entry nav ── */
.entry-nav{
  display:flex;justify-content:space-between;align-items:stretch;
  margin-top:48px;padding-top:24px;border-top:1px solid var(--border);gap:12px
}
.entry-nav-btn{
  display:flex;flex-direction:column;gap:3px;padding:12px 16px;
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  cursor:pointer;min-width:140px;transition:border-color .12s;
  text-decoration:none;color:inherit
}
.entry-nav-btn:hover{border-color:var(--accent)}
.entry-nav-btn.right{text-align:right;margin-left:auto}
.nav-dir{font-size:11px;color:var(--text-dim)}
.nav-date-label{font-size:13px;font-weight:500;color:var(--text)}
.entry-nav-spacer{flex:1}

/* ── Mobile ── */
@media(max-width:640px){
  .sidebar{
    position:fixed;top:0;left:0;height:100vh;z-index:200;
    transform:translateX(-100%);
  }
  .sidebar.open{transform:translateX(0)}
  .topbar{left:0}
  .menu-btn{display:block}
  .kbd-hint{display:none}
  .entry{padding:24px 16px 60px}
}
</style>

# 2026-05-28

## 미해결 항목

- [ ] Figma 디자인 전체 리디자인 — 아이콘 및 컴포넌트 주미님이 직접 수정 예정, 이후 코드 sync 재진행
- [ ] 코드 기반 컴포넌트 라이브러리 관리 방식 확정 (design-system 폴더 기반)

---

## 함정 모음

- **Figma 컴포넌트 인스턴스 직접 편집** — 마스터 컴포넌트를 직접 편집하면 모든 인스턴스에 영향. 개별 변형이 필요한 경우 Detach 후 작업. 마스터 컴포넌트는 별도 페이지에 보관.
- **폴더 구조 분산** — design-system/, docs/, AGENTS.md, CLAUDE.md에 중복·분산 내용 존재. 역할을 명확히 구분하지 않으면 "어느 파일이 최신이냐" 문제가 반복됨.
- **design-system.md 중복** — docs/design-system.md가 design-system/ 폴더와 내용 겹침. 삭제 처리.

---

## 회고 및 인사이트

### AI 도구 활용

- **AI에게 기억 구조화가 작업이다.** README, CLAUDE.md, AGENTS.md 정비가 코드 작성 못지않게 중요한 협업 준비. 구조가 없으면 다음 세션이 처음부터 다시 시작.
- **문서화 맥락을 AI가 이해하려면 역할이 명확해야 한다.** "design-system이 뭐고 docs가 뭐야?"라는 질문이 나왔다는 건 폴더 이름만으로 역할이 불분명했다는 뜻.

### 설계 결정

- **디자이너 주도 방식 재확인.** "디자인은 내가 전체적으로 다시 고칠 것임" — AI가 코드로 생성한 디자인을 쓰는 게 아니라, 디자이너가 직접 결정하고 AI는 구현 지원 역할.
- **폴더 역할은 목적 기반으로.** `design-system/` = 구현 자산 (컴포넌트·토큰·파운데이션), `docs/` = 판단 근거 문서 (원칙·의사결정·가이드).

---

## 2026-05-28

### 1. 폴더 구조 중복 분산 문제 정비

```
지금보니까 socraai_product design 폴더내에 design-system, docs 폴더내에 문서들이랑
agents, claude 등을 보니까 중복된 내용들이 분산되어있단 느낌도 받거든?
```

**Claude Code 작업:**
- `design-system/`, `docs/`, `CLAUDE.md`, `AGENTS.md`, `README.md` 전체 구조 검토
- 역할 재정의:

| 경로 | 역할 |
|------|------|
| `design-system/` | 컴포넌트·파운데이션·토큰 등 구현 자산 |
| `docs/` | UX 원칙·의사결정·가이드 등 판단 근거 문서 |
| `CLAUDE.md` | Claude Code 작업 지시서 |
| `AGENTS.md` | 외부 AI 에이전트 지침 |

- `docs/design-system.md` 등 중복 파일 삭제

---

### 2. docs 폴더 향후 역할 논의

```
docs라는 폴더가 있는 이유는 뭔데? 쟤는 이제 어떤걸 design-system과 다르게 아카이빙할건데?
아니 향후에 제품이 고도화되면 필요할수도있지 너가 그런 계획을 해보라고
```

**Claude Code 작업:**
- 웹사이트 2곳 확인 후 재검토: `jumijeong-design.github.io/socra-ai-workflow-guide`, `seed-design.io/docs`
- docs/ 향후 계획 수립: UX 원칙, 의사결정 히스토리, 접근성 가이드, 기획서 연동 문서 등

---

### 3. 디자인 시스템 파운데이션 문서 4종 작성

**Claude Code 작업:**
- `design-system/foundation/color.md` — 컬러 팔레트, 시맨틱 토큰, 다크모드 기준
- `design-system/foundation/typography.md` — 타입 스케일, 폰트 패밀리, 행간 기준
- `design-system/foundation/spacing.md` — 스페이싱 시스템, 그리드, 컴포넌트 간격
- `design-system/foundation/shadow.md` — 그림자 레벨, 사용 기준
- `design-system/rules.md` 업데이트 (컴포넌트 작업 원칙 재정비)
- `design-system/components.md` 업데이트

---

<script>
marked.use({ gfm: true, breaks: false });

const ENTRIES = [
  { date: '2026-05-29', dayKo: '금요일', tags: ['figma', 'socra-ai-product', 'worklog-viewer'] },
  { date: '2026-05-28', dayKo: '목요일', tags: ['socra-ai-product', 'figma', 'jumi-worklog'] },
  { date: '2026-05-27', dayKo: '수요일', tags: ['workflow-guide'] },
  { date: '2026-05-26', dayKo: '화요일', tags: ['socrachat', 'figma'] },
  { date: '2026-05-22', dayKo: '금요일', tags: ['socrachat', 'notion'] },
  { date: '2026-05-21', dayKo: '목요일', tags: ['socrachat', 'figma'] },
];

const ENTRY_MAP = {};
ENTRIES.forEach((e, i) => { ENTRY_MAP[e.date] = i; });

const DOW = ['일','월','화','수','목','금','토'];
const MONTH_KO = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

let currentIndex = 0;
let calYear = 2026, calMonth = 4;
let viewMode = 'cal';

const todayStr = new Date().toISOString().slice(0, 10);

function pad(n) { return String(n).padStart(2, '0'); }

function getMarkdown(date) {
  const el = document.getElementById('entry-' + date);
  return el ? el.textContent.trim() : '';
}

function formatDate(dateStr) {
  const [y, m, d] = dateStr.split('-');
  return `${y}. ${parseInt(m)}. ${parseInt(d)}`;
}

function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
  document.body.style.overflow = '';
}

function shiftMonth(delta) {
  calMonth += delta;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  buildCalendar();
}

function buildCalendar() {
  document.getElementById('cal-month').textContent = `${calYear}. ${MONTH_KO[calMonth]}`;

  const firstDow = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

  let html = DOW.map(d => `<div class="cal-dow">${d}</div>`).join('');
  for (let i = 0; i < firstDow; i++) html += `<div class="cal-cell"></div>`;

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calYear}-${pad(calMonth + 1)}-${pad(d)}`;
    const dow = (firstDow + d - 1) % 7;
    const idx = ENTRY_MAP[dateStr];
    const hasEntry = idx !== undefined;
    const isActive = hasEntry && idx === currentIndex;
    const isToday = dateStr === todayStr;
    const dowClass = dow === 0 ? ' sun' : dow === 6 ? ' sat' : '';
    const entryClass = hasEntry ? ' has-entry' : '';
    const activeClass = isActive ? ' active' : '';
    const todayClass = isToday ? ' today' : '';
    const click = hasEntry ? `onclick="goTo(${idx})"` : '';
    html += `<div class="cal-cell${dowClass}${entryClass}${activeClass}${todayClass}" ${click}>${d}</div>`;
  }

  document.getElementById('cal-grid').innerHTML = html;
  buildList();
}

function setView(mode) {
  viewMode = mode;
  document.querySelectorAll('.vt-btn').forEach(b => b.classList.toggle('active', b.dataset.view === mode));
  const calSection = document.getElementById('cal-section');
  const list = document.getElementById('sidebar-list');
  if (mode === 'cal') {
    calSection.style.display = '';
    list.classList.add('with-border');
  } else {
    calSection.style.display = 'none';
    list.classList.remove('with-border');
  }
  buildList();
}

function buildList() {
  document.getElementById('brand-meta').textContent = `${ENTRIES.length}개 항목`;
  const list = document.getElementById('sidebar-list');
  if (viewMode === 'cal') {
    list.innerHTML = ENTRIES.map((e, i) => `
      <div class="list-item compact${i === currentIndex ? ' active' : ''}" onclick="goTo(${i})">
        <div class="list-dot"></div>
        <span class="list-date">${formatDate(e.date)} ${e.dayKo}</span>
      </div>
    `).join('');
  } else {
    list.innerHTML = ENTRIES.map((e, i) => `
      <div class="list-item${i === currentIndex ? ' active' : ''}" onclick="goTo(${i})">
        <span class="list-date">${formatDate(e.date)}</span>
        <span class="list-day">${e.dayKo}</span>
        <div class="list-tags">${e.tags.map(t => `<span class="list-tag">${t}</span>`).join('')}</div>
      </div>
    `).join('');
  }
}

function renderEntry(index) {
  const e = ENTRIES[index];
  const html = marked.parse(getMarkdown(e.date));
  const prev = ENTRIES[index + 1];
  const next = ENTRIES[index - 1];
  const prevBtn = prev
    ? `<a class="entry-nav-btn" onclick="goTo(${index + 1})"><span class="nav-dir">← 이전</span><span class="nav-date-label">${formatDate(prev.date)}</span></a>`
    : '<span></span>';
  const nextBtn = next
    ? `<a class="entry-nav-btn right" onclick="goTo(${index - 1})"><span class="nav-dir">다음 →</span><span class="nav-date-label">${formatDate(next.date)}</span></a>`
    : '<span></span>';
  document.getElementById('entry-area').innerHTML = `
    <div class="entry">
      <div class="entry-header">
        <div class="entry-title">${formatDate(e.date)} <span style="color:var(--text-muted);font-weight:400;font-size:16px">${e.dayKo}</span></div>
        <div class="entry-tags">${e.tags.map(t => `<span class="entry-tag">${t}</span>`).join('')}</div>
      </div>
      <div class="entry-body md">${html}</div>
      <nav class="entry-nav">${prevBtn}<span class="entry-nav-spacer"></span>${nextBtn}</nav>
    </div>
  `;
  document.querySelector('.main').scrollTop = 0;
}

function goTo(index) {
  if (index < 0 || index >= ENTRIES.length) return;
  currentIndex = index;
  const [y, m] = ENTRIES[index].date.split('-').map(Number);
  calYear = y; calMonth = m - 1;
  buildCalendar();
  renderEntry(index);
  closeSidebar();
}

function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('theme-btn').textContent = isDark ? '🌙 다크' : '☀ 라이트';
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') goTo(currentIndex + 1);
  if (e.key === 'ArrowRight') goTo(currentIndex - 1);
  if (e.key === 'Escape') closeSidebar();
});

buildCalendar();
renderEntry(0);
</script>
